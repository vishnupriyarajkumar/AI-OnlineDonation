# ============================================================
# APPLICATION PROPERTIES — Charity Management System
# ============================================================

spring.application.name=charity-backend
server.port=8080

# ── MongoDB ──────────────────────────────────────────────────
spring.data.mongodb.uri=mongodb://localhost:27017/charity_db
spring.data.mongodb.auto-index-creation=true

# ── JWT ──────────────────────────────────────────────────────
app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
app.jwt.access-token-expiry=900000
app.jwt.refresh-token-expiry=604800000

# ── Mail (Gmail SMTP) ─────────────────────────────────────────
# Replace with your real Gmail address and App Password (not your account password).
# To generate an App Password: Google Account → Security → 2-Step Verification → App passwords
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=newdawnfoundationtrust@gmail.com
spring.mail.password=${key}


spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.debug=true
logging.level.org.springframework.mail=DEBUG
logging.level.com.sun.mail=DEBUG
app.mail.from=New Dawn Foundation Trust <newdawnfoundationtrust@gmail.com>

# ── Twilio SMS (for OTP via SMS — optional, fallback to email) ──
# Sign up at https://www.twilio.com/try-twilio
# Set to true to use SMS delivery; false = email-only OTP
twilio.enabled=false
twilio.account-sid=ACxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
twilio.auth-token=your_twilio_auth_token
twilio.from-number=+1234567890

# ── OTP Settings ──────────────────────────────────────────────
app.otp.expiry-minutes=5
app.otp.max-attempts=3
app.otp.resend-cooldown-seconds=30

# ── Account Lockout ───────────────────────────────────────────
app.security.max-failed-attempts=5

# ── Razorpay ─────────────────────────────────────────────────
razorpay.key.id=rzp_test_XXXXXXXXXXXXXXXX
razorpay.key.secret=XXXXXXXXXXXXXXXXXXXXXXXX

# ── CORS ─────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# ── Swagger ──────────────────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

# ── File Upload ──────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/

# ── Async ────────────────────────────────────────────────────
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=16
spring.task.execution.pool.queue-capacity=100

# ── Google Gemini AI (for multilingual translation) ──────────
# Get your free API key from: https://aistudio.google.com/apikey
gemini.api.key=${key}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent

# ── Supported Languages ───────────────────────────────────────
app.languages=en,ta,hi,te,ml,kn
logging.level.org.springframework.security=WARN
logging.level.org.springframework.mail=WARN
