<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — CharityOrg</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0f0f1a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .icon { font-size: 80px; margin-bottom: 24px; animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.7;transform:scale(1.05)} }
    h1 { font-size: 32px; font-weight: 800; margin-bottom: 12px; }
    p  { font-size: 16px; color: #9ca3af; max-width: 400px; line-height: 1.7; margin-bottom: 32px; }
    a  {
      display: inline-block;
      padding: 12px 28px;
      background: linear-gradient(135deg, #7c3aed, #a78bfa);
      color: white;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 700;
      transition: transform 0.2s;
    }
    a:hover { transform: translateY(-2px); }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>You're Offline</h1>
  <p>It looks like you've lost your internet connection. Please check your network and try again. Your kindness will continue the moment you're back online!</p>
  <a href="/" onclick="location.reload()">🔄 Try Again</a>
</body>
</html>
